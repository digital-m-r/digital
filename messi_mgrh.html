<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Quiniela BMM 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-deep: #080E1F;
            --bg-card: #111827;
            --border: #1F2D45;
            --red: #DC2626;
            --green: #16A34A;
            --yellow: #CA8A04;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-deep);
            color: #fff;
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            background-image: radial-gradient(ellipse 80% 40% at 50% -10%, rgba(180, 0, 0, 0.15) 0%, transparent 60%);
        }

        .bebas {
            font-family: 'Bebas Neue', sans-serif;
        }

        .card-bg {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
        }

        /* PIN screen */
        .pin-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #4B5563;
            transition: all 0.15s ease;
        }

        .pin-dot.filled {
            background: #DC2626;
            border-color: #DC2626;
            box-shadow: 0 0 8px rgba(220, 38, 38, 0.5);
        }

        .pin-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #111827;
            border: 1.5px solid #1F2D45;
            font-size: 22px;
            font-weight: 900;
            color: #fff;
            transition: all 0.12s ease;
            cursor: pointer;
        }

        .pin-btn:hover {
            background: #1A2234;
            border-color: #DC2626;
        }

        .pin-btn:active {
            transform: scale(0.93);
        }

        /* Flag */
        .flag-img {
            width: 36px;
            height: 24px;
            object-fit: cover;
            border-radius: 3px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
        }

        .flag-tbd {
            width: 36px;
            height: 24px;
            border-radius: 3px;
            background: #374151;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            color: #6B7A99;
            font-weight: 700;
        }

        /* Status badges */
        .status-badge {
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.06em;
            padding: 2px 8px;
            border-radius: 999px;
            text-transform: uppercase;
        }

        .status-pending {
            background: #1F2D45;
            color: #64748b;
        }

        .status-closed {
            background: #14532d;
            color: #86efac;
        }

        .status-corrected {
            background: #78350f;
            color: #fde68a;
        }

        /* Score inputs */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
        }

        input[type="number"] {
            -moz-appearance: textfield;
        }

        .score-admin {
            width: 44px;
            height: 44px;
            background: #0D1526;
            border: 1.5px solid #2A3A5C;
            border-radius: 8px;
            text-align: center;
            font-size: 18px;
            font-weight: 900;
            color: #fff;
        }

        .score-admin:focus {
            outline: none;
            border-color: #DC2626;
        }

        /* Animations */
        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0
            }

            to {
                transform: translateY(0);
                opacity: 1
            }
        }

        .slide-up {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* Skeleton */
        .skeleton {
            background: linear-gradient(90deg, #111827 25%, #1A2234 50%, #111827 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0
            }

            100% {
                background-position: -200% 0
            }
        }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            transition: transform .3s cubic-bezier(.16, 1, .3, 1), opacity .3s;
            opacity: 0;
            z-index: 9999;
            pointer-events: none;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Progress bar */
        .prog-bar {
            height: 4px;
            background: #1F2D45;
            border-radius: 2px;
            overflow: hidden;
        }

        .prog-fill {
            height: 100%;
            border-radius: 2px;
            transition: width .5s ease;
        }

        /* Stat card */
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        /* Select custom */
        select {
            appearance: none;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #1F2D45;
            border-radius: 3px;
        }
    </style>
</head>

        // ─── TOAST ────────────────────────────────────────────────────────
        function toast(msg, type = "info") {
            const t = document.getElementById('toast');
            t.style.background = type === 'success' ? '#14532d' : type === 'error' ? '#7f1d1d' : '#1A2234';
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // ─── INICIAR ADMIN ────────────────────────────────────────────────
        async function iniciarAdmin() {
            // Cargar resultados existentes desde Firebase
            const resSnap = await getDoc(doc(db, "admin", "resultados"));
            if (resSnap.exists()) resultadosAdmin = resSnap.data().partidos || {};

            actualizarStats();
            window.renderPartidos();
        }

        // ─── STATS GLOBALES ───────────────────────────────────────────────
        async function actualizarStats() {
            const cerrados = Object.keys(resultadosAdmin).length;
            document.getElementById('stat-cerrados').textContent = cerrados;
            document.getElementById('hdr-cerrados').textContent = cerrados + "/102";
            document.getElementById('prog-label').textContent = cerrados + " / 102 partidos cerrados";
            document.getElementById('prog-fill').style.width = (cerrados / 102 * 100).toFixed(1) + "%";

            // Usuarios y lider
            try {
                const usersSnap = await getDocs(collection(db, "usuarios"));
                let totalUsuarios = 0, totalPuntos = 0, lider = "—", maxPts = -1;
                usersSnap.forEach(d => {
                    totalUsuarios++;
                    const pts = d.data().puntos || 0;
                    totalPuntos += pts;
                    if (pts > maxPts) { maxPts = pts; lider = d.data().nombre; }
                });
                document.getElementById('stat-usuarios').textContent = totalUsuarios;
                document.getElementById('stat-puntos').textContent = totalPuntos;
                document.getElementById('stat-lider').textContent = lider;
            } catch (e) { }
        }

        // ─── RENDER PARTIDOS ──────────────────────────────────────────────
        window.renderPartidos = function () {
            const filtro = document.getElementById('filtro-parte').value;
            const lista = document.getElementById('lista-partidos');
            lista.innerHTML = '';

            let partidos = calendario;
            if (filtro === 'pendientes') partidos = calendario.filter(p => !resultadosAdmin[p.id]);
            else if (['1', '2', '3', '4'].includes(filtro)) partidos = calendario.filter(p => p.parte === parseInt(filtro));

            if (partidos.length === 0) {
                lista.innerHTML = '<div class="text-center py-12 text-gray-500 font-bold">No hay partidos en este filtro.</div>';
                return;
            }

            partidos.forEach((partido, idx) => {
                const res = resultadosAdmin[partido.id];
                const cerrado = !!res;
                const horario = HORARIOS[partido.id] || "";
                const esFinal = partido.id === "p_102";

                const cardBg = esFinal ? "bg-gradient-to-b from-[#1A1500] to-[#111827]" : "bg-[#111827]";

                    : `<span class="status-badge status-pending">PENDIENTE</span>`;

                const optE = res?.res === 'empate' ? 'selected' : '';
                const optV = res?.res === 'visitante' ? 'selected' : '';
                const glVal = res?.gL ?? "";
                const gvVal = res?.gV ?? "";

                lista.innerHTML += `
        <div class="${cardBg} border ${borderCol} rounded-xl p-4 relative" style="animation:slideUp .3s ${idx * 0.025}s both">
            <!-- Header centrado -->
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2 flex-wrap">
                    <span class="text-[9px] font-black text-red-400 tracking-widest uppercase">${partido.fase}</span>
                    <span class="text-[9px] text-gray-600">|</span>
                    <span class="text-[9px] font-black text-yellow-400 tracking-widest uppercase">${partido.num}</span>
                    ${horario ? `<span style="font-size:10px;font-weight:800;color:#93c5fd;background:rgba(0,50,160,0.3);border:1px solid rgba(74,127,224,0.3);border-radius:6px;padding:1px 7px">${horario} CDMX</span>` : ""}
                    ${esFinal ? '<span class="text-yellow-400 text-xs font-black">&#x1F3C6;</span>' : ""}
                </div>
                ${statusBadge}
            </div>

            <!-- Equipos + inputs -->
            <div class="flex items-center gap-3">
                <!-- LOCAL -->
                <div class="flex-1 flex flex-col items-center gap-1">
                    ${flagHTML(partido.local.code)}
                    <p class="text-[10px] font-bold text-gray-300 text-center leading-tight">${partido.local.nombre}</p>
                </div>

                <!-- CONTROLES CENTRALES -->
                <div class="flex flex-col items-center gap-2 shrink-0">
                    <!-- Marcador -->
                    <div class="flex items-center gap-1.5">
                        <input type="number" id="gl-${partido.id}" value="${glVal}"
                            class="score-admin" placeholder="0" min="0" max="30"
                            oninput="autoDetectarGanador('${partido.id}')">
                        <span class="text-gray-600 font-black">:</span>
                        <input type="number" id="gv-${partido.id}" value="${gvVal}"
                            class="score-admin" placeholder="0" min="0" max="30"
                            oninput="autoDetectarGanador('${partido.id}')">
                    </div>
                    <!-- Select resultado -->
                    <div class="relative">
                        <select id="res-${partido.id}"
                            class="bg-[#0D1526] border border-[#2A3A5C] text-white text-xs font-bold rounded-lg px-3 py-1.5 focus:outline-none focus:border-red-500 cursor-pointer pr-6"
                            style="appearance:none">
                            <option value="">-- Resultado --</option>
                            <option value="local" ${optL}>Gana ${partido.local.nombre}</option>

                            <option value="visitante" ${optV}>Gana ${partido.visitante.nombre}</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-1.5 flex items-center text-gray-500">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                        </div>
                    </div>
                    <!-- Boton cerrar -->
                    <button onclick="cerrarPartido('${partido.id}')"
                        class="mt-1 px-4 py-2 rounded-lg font-black text-xs transition-all ${cerrado
                        ? 'bg-yellow-700 hover:bg-yellow-600 text-white'
                        : 'bg-red-600 hover:bg-red-500 text-white shadow-[0_0_12px_rgba(220,38,38,0.3)]'}">
                        ${cerrado ? '&#x270E; CORREGIR' : '&#x2713; CERRAR Y CALCULAR'}
                    </button>
                </div>

                <!-- VISITANTE -->
                <div class="flex-1 flex flex-col items-center gap-1">
                    ${flagHTML(partido.visitante.code)}
                    <p class="text-[10px] font-bold text-gray-300 text-center leading-tight">${partido.visitante.nombre}</p>
                </div>
            </div>

            <!-- Preview resultado actual si cerrado -->
            ${cerrado ? `
            <div class="mt-3 pt-3 border-t border-[#1F2D45] text-center">
                <p class="text-[10px] text-green-400 font-bold">
                    Resultado registrado: <span class="text-white">${res.gL} &ndash; ${res.gV}</span>
                    &bull; Ganador: <span class="text-white capitalize">${res.res === 'local' ? partido.local.nombre : res.res === 'visitante' ? partido.visitante.nombre : 'Empate'}</span>
                </p>
            </div>` : ''}
        </div>`;
            });
        };

        // ─── AUTO DETECTAR GANADOR ────────────────────────────────────────
        window.autoDetectarGanador = function (id) {
            const gL = document.getElementById('gl-' + id)?.value;
            const gV = document.getElementById('gv-' + id)?.value;
            if (gL !== "" && gV !== "") {
                const nL = parseInt(gL), nV = parseInt(gV);
                const val = nL > nV ? "local" : nL < nV ? "visitante" : "empate";
                const sel = document.getElementById('res-' + id);
                if (sel) sel.value = val;
            }
        };

        // ─── CERRAR PARTIDO Y RECALCULAR ──────────────────────────────────
        // Estrategia: RECALCULAR DESDE CERO todos los puntos de todos los usuarios
        // Esto garantiza consistencia total aunque se corrija un resultado.
        window.cerrarPartido = async function (partidoId) {
            const resVal = document.getElementById('res-' + partidoId)?.value;
            const glVal = document.getElementById('gl-' + partidoId)?.value;
            const gvVal = document.getElementById('gv-' + partidoId)?.value;

            if (!resVal || glVal === "" || gvVal === "") {
                toast("Completa el marcador y el resultado antes de cerrar.", "error");
                return;
            }

            const partido = calendario.find(p => p.id === partidoId);
            const yaExistia = !!resultadosAdmin[partidoId];
            const accion = yaExistia ? "CORREGIR" : "CERRAR";

            const confirmar = confirm(
                `${accion} PARTIDO: ${partido?.local.nombre} vs ${partido?.visitante.nombre}\n` +
                `Marcador: ${glVal} \u2013 ${gvVal}\n` +
                `Resultado: ${resVal === 'local' ? partido?.local.nombre : resVal === 'visitante' ? partido?.visitante.nombre : 'Empate'}\n\n` +
                `Se recalcular\u00e1n los puntos de TODOS los usuarios. \u00bfContinuar?`
            );
            if (!confirmar) return;

            // Mostrar loading en el botón
            const btn = document.querySelector(`button[onclick="cerrarPartido('${partidoId}')"]`);
            if (btn) { btn.textContent = "CALCULANDO..."; btn.disabled = true; }

            try {
                // 1. Guardar resultado en Firebase
                resultadosAdmin[partidoId] = { res: resVal, gL: glVal, gV: gvVal };
                await setDoc(doc(db, "admin", "resultados"), { partidos: resultadosAdmin }, { merge: false });

                // 2. Recalcular puntos de TODOS los usuarios desde cero
                await recalcularTodosLosPuntos();

                toast(`\u2705 Partido cerrado. Puntos recalculados para todos los usuarios.`, "success");
                actualizarStats();
                window.renderPartidos();

            } catch (err) {
                toast("Error: " + err.message, "error");
                if (btn) { btn.disabled = false; }
            }
        };

        // ─── ALGORITMO DE PUNTOS ──────────────────────────────────────────
        // Recorre TODOS los usuarios y TODOS sus picks,
        // compara contra resultadosAdmin, suma puntos y actualiza Firebase.
        async function recalcularTodosLosPuntos() {
            // Leer todos los pronosticos
            const pronosticosSnap = await getDocs(collection(db, "pronosticos"));

            const actualizaciones = [];

            pronosticosSnap.forEach(pronoDoc => {
                const nomina = pronoDoc.id;
                const selecciones = pronoDoc.data().selecciones || {};
                let puntosTotales = 0;

                // Recorrer cada pick del usuario
                for (const [partidoId, pick] of Object.entries(selecciones)) {
                    const resultadoReal = resultadosAdmin[partidoId];
                    if (!resultadoReal) continue; // Partido aún sin resultado

                    const atinoResultado = pick.res === resultadoReal.res;
                    const atinoMarcador = pick.gL === resultadoReal.gL && pick.gV === resultadoReal.gV;

                    if (atinoResultado && atinoMarcador) {
                        puntosTotales += 10; // Resultado + marcador exacto
                    } else if (atinoResultado) {
                        puntosTotales += 3;  // Solo resultado
                    }
                    // Si falló: +0
                }

                actualizaciones.push({ nomina, puntos: puntosTotales });
            });

            // Escribir puntos actualizados en paralelo
            await Promise.all(
                actualizaciones.map(({ nomina, puntos }) =>
                    updateDoc(doc(db, "usuarios", nomina), { puntos })
                )
            );
        }

        // Keyboard support PIN
        document.addEventListener('keydown', (e) => {
            const pinVisible = !document.getElementById('pin-screen').classList.contains('hidden');
            if (!pinVisible) return;
            if (e.key >= '0' && e.key <= '9') window.pinPress(parseInt(e.key));
            if (e.key === 'Backspace') window.pinDelete();
        });

    </script>
</body>

</html>
