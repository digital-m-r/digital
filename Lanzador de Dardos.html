document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ground:rgba(20,8,10,0.85);display:flex;align-items:center;justify-content:center;z-index:80;\">\n      <div style=\"width:700px;background:#F6EEDD;color:#2A2016;border-radius:28px;padding:52px;display:flex;flex-direction:column;align-items:center;gap:18px;box-shadow:0 30px 70px rgba(0,0,0,0.5);border:6px solid #F2C238;\">\n        <div style=\"font-family:'Alfa Slab One',cursive;font-size:40px;color:#7A1F2B;text-align:center;\">{{ summaryHeadline }}<\u002Fdiv>\n        <div style=\"font-size:24px;font-weight:700;\">Jugador 1: {{ score1 }} &nbsp;·&nbsp; Jugador 2: {{ score2 }}<\u002Fdiv>\n        <div style=\"font-size:19px;opacity:0.8;text-align:center;max-width:520px;\">Recordá: Oro = máximo cuidado, Plata = uso consciente, Bronce = sin desperdicio. Cada gota cuenta.<\u002Fdiv>\n        <div sc-camel-on-click=\"{{ restartGame }}\" style=\"margin-top:10px;background:#7A1F2B;color:#F6EEDD;font-weight:800;font-size:20px;letter-spacing:1px;padding:16px 40px;border-radius:14px;cursor:pointer;\">JUGAR DE NUEVO<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: {&quot;width&quot;: 1920, &quot;height&quot;: 1080},\n  &quot;rounds&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 5, &quot;min&quot;: 3, &quot;max&quot;: 15, &quot;step&quot;: 1, &quot;tsType&quot;: &quot;number&quot;},\n  &quot;contentPool&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;all&quot;, &quot;options&quot;: [&quot;all&quot;, &quot;products&quot;, &quot;materials&quot;], &quot;tsType&quot;: &quot;string&quot;}\n}\">\nconst ITEMS = [\n  { name: \"Aquaphor Healing Ointment (OTC)\", type: \"producto\", tier: \"ORO\" },\n  { name: \"Nivea Creme\", type: \"producto\", tier: \"ORO\" },\n  { name: \"NBO Nourishing Milk (Noli Regional)\", type: \"producto\", tier: \"ORO\" },\n  { name: \"Eucerin Lip Repair Balm\", type: \"producto\", tier: \"ORO\" },\n  { name: \"Eucerin Dry Skin 5% Urea Cream\", type: \"producto\", tier: \"ORO\" },\n  { name: \"NBO Repair & Care Body Lotion\", type: \"producto\", tier: \"PLATA\" },\n  { name: \"Coppertone Sport/Kids SPF 50 Lotion\", type: \"producto\", tier: \"PLATA\" },\n  { name: \"Eucerin 10% Urea Repair Lotion + GG\", type: \"producto\", tier: \"PLATA\" },\n  { name: \"Eucerin Face Tinted Mineral SPF30+ (OTC)\", type: \"producto\", tier: \"PLATA\" },\n  { name: \"Eucerin Plus Lotion\", type: \"producto\", tier: \"PLATA\" },\n  { name: \"Nivea In-Shower Body Milk\", type: \"producto\", tier: \"BRONCE\" },\n  { name: \"Eucerin Dry Skin Urea Repair Plus Lotion 5%\", type: \"producto\", tier: \"BRONCE\" },\n  { name: \"Eucerin Eczema Relief Body Creme (OTC)\", type: \"producto\", tier: \"BRONCE\" },\n  { name: \"Eucerin pH5 Lotion\", type: \"producto\", tier: \"BRONCE\" },\n  { name: \"Coppertone Sport Face Lotion SPF 60+ (OTC)\", type: \"producto\", tier: \"BRONCE\" },\n  { name: \"Ester Wax / 12944\", type: \"materia\", tier: \"ORO\" },\n  { name: \"Semi-Ceresin / 96646\", type: \"materia\", tier: \"ORO\" },\n  { name: \"Zinc Oxide TECS 2\", type: \"materia\", tier: \"ORO\" },\n  { name: \"Bisabolol / 258\", type: \"materia\", tier: \"ORO\" },\n  { name: \"UV-Absorber / 1164\", type: \"materia\", tier: \"ORO\" },\n  { name: \"Eucerit PA / 11270\", type: \"materia\", tier: \"PLATA\" },\n  { name: \"Zinc Oxide TECS 1\", type: \"materia\", tier: \"PLATA\" },\n  { name: \"Panthenol / 11185\", type: \"materia\", tier: \"PLATA\" },\n  { name: \"Glyceryl Glucoside / 96361\", type: \"materia\", tier: \"PLATA\" },\n  { name: \"Hydroxypropyl Starch Phosphate / 96103\", type: \"materia\", tier: \"PLATA\" },\n  { name: \"Ceresin / 96646\", type: \"materia\", tier: \"BRONCE\" },\n  { name: \"Urea / 827\", type: \"materia\", tier: \"BRONCE\" },\n  { name: \"Ultrez 21 (EM only)\", type: \"materia\", tier: \"BRONCE\" },\n  { name: \"Octyldodecanol / 79\", type: \"materia\", tier: \"BRONCE\" },\n  { name: \"Licorice Extract / 96146\", type: \"materia\", tier: \"BRONCE\" }\n];\n\nconst TIER_DESC = { ORO: \"Máximo cuidado\", PLATA: \"Uso consciente\", BRONCE: \"Sin desperdicio\" };\nconst FIRE_KEYS = [\"ArrowRight\", \"ArrowLeft\", \"ArrowUp\", \"ArrowDown\", \"PageUp\", \"PageDown\", \" \", \"Enter\", \"b\", \"B\"];\nconst CONFETTI_COLORS = [\"#F2C238\", \"#C7CBCE\", \"#5DD3B3\", \"#FFFFFF\", \"#0055C8\"];\nconst DB_URL = \"https://feria-dardos-default-rtdb.firebaseio.com\";\nconst REMOTE_MAX_R = 368;\n\nfunction tierFromRadius(r) {\n  if (r <= 123) return \"ORO\";\n  if (r <= 252) return \"PLATA\";\n  if (r <= 378) return \"BRONCE\";\n  return null;\n}\n\nclass Component extends DCLogic {\n  boardRef = React.createRef();\n\n  state = {\n    pool: [],\n    idx: 0,\n    phase: \"choosing\", // choosing | throwing | landed | result | summary\n    scores: [0, 0],\n    streaks: [0, 0],\n    dartDx: 0,\n    dartDy: 0,\n    dartRot: 0,\n    lastTier: null,\n    aimX: 0,\n    aimY: 0,\n    aimTier: \"ORO\",\n    confetti: [],\n    flash: false,\n    shake: false\n  };\n\n  state2Scale = 1;\n\n  componentDidMount() {\n    this.setupGame();\n    this._onKeyDown = (e) => {\n      if (FIRE_KEYS.indexOf(e.key) !== -1) {\n        e.preventDefault();\n        this.fire();\n      }\n    };\n    window.addEventListener(\"keydown\", this._onKeyDown);\n    this._onResize = () => {\n      const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);\n      this.state2Scale = s;\n      this.forceUpdate();\n    };\n    this._onResize();\n    window.addEventListener(\"resize\", this._onResize);\n    this._lastRemoteFireTs = 0;\n    this.remoteStatus = \"conectando...\";\n    try {\n      this._remoteSource = new EventSource(DB_URL + \"/control.json\");\n      this._remoteSource.addEventListener(\"put\", (e) => { this.remoteStatus = \"conectado\"; this.forceUpdate(); this.handleRemoteEvent(e); });\n      this._remoteSource.addEventListener(\"patch\", (e) => { this.remoteStatus = \"conectado\"; this.forceUpdate(); this.handleRemoteEvent(e); });\n      this._remoteSource.onerror = () => { this.remoteStatus = \"error de conexión remota\"; this.forceUpdate(); };\n    } catch (err) {\n      this.remoteStatus = \"no disponible\";\n    }\n  }\n\n  handleRemoteEvent(e) {\n    let msg;\n    try { msg = JSON.parse(e.data); } catch (err) { return; }\n    const path = msg.path;\n    const data = msg.data;\n    if (!data) return;\n    if (path === \"/\" ) {\n      if (data.aim) this.applyRemoteAim(data.aim);\n      if (data.fire) this.applyRemoteFire(data.fire);\n    } else if (path === \"/aim\") {\n      this.applyRemoteAim(data);\n    } else if (path === \"/fire\") {\n      this.applyRemoteFire(data);\n    }\n  }\n\n  applyRemoteAim(aim) {\n    if (this.state.phase !== \"choosing\" || typeof aim.x !== \"number\") return;\n    const dx = aim.x * REMOTE_MAX_R;\n    const dy = aim.y * REMOTE_MAX_R;\n    const r = Math.sqrt(dx * dx + dy * dy);\n    this.setState({ aimX: dx, aimY: dy, aimTier: tierFromRadius(r) });\n  }\n\n  applyRemoteFire(fireData) {\n    if (!fireData.ts || fireData.ts <= this._lastRemoteFireTs) return;\n    this._lastRemoteFireTs = fireData.ts;\n    if (this.state.phase !== \"choosing\" || typeof fireData.x !== \"number\") return;\n    const dx = fireData.x * REMOTE_MAX_R;\n    const dy = fireData.y * REMOTE_MAX_R;\n    const r = Math.sqrt(dx * dx + dy * dy);\n    const tier = tierFromRadius(r);\n    if (!tier) return;\n    this.fire(tier, dx, dy);\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener(\"keydown\", this._onKeyDown);\n    window.removeEventListener(\"resize\", this._onResize);\n    if (this._whistleOsc) { try { this._whistleOsc.stop(); } catch (e) {} }\n    if (this._remoteSource) this._remoteSource.close();\n  }\n\n  shuffle(arr) {\n    const a = arr.slice();\n    for (let i = a.length - 1; i > 0; i--) {\n      const j = Math.floor(Math.random() * (i + 1));\n      [a[i], a[j]] = [a[j], a[i]];\n    }\n    return a;\n  }\n\n  setupGame() {\n    const contentPool = this.props.contentPool ?? \"all\";\n    let base = ITEMS;\n    if (contentPool === \"products\") base = ITEMS.filter(i => i.type === \"producto\");\n    if (contentPool === \"materials\") base = ITEMS.filter(i => i.type === \"materia\");\n    const perPlayer = Math.max(3, Math.min(this.props.rounds ?? 5, Math.floor(base.length / 2)));\n    const poolSize = perPlayer * 2;\n    const pool = this.shuffle(base).slice(0, poolSize);\n    this.setState({\n      pool, idx: 0, phase: \"choosing\", scores: [0, 0], streaks: [0, 0],\n      dartDx: 0, dartDy: 0, dartRot: 0, aimX: 0, aimY: 0, aimTier: \"ORO\",\n      confetti: [], flash: false, shake: false\n    });\n  }\n\n  restartGame = () => this.setupGame();\n\n  ensureAudio() {\n    if (!this._audioCtx) {\n      const Ctx = window.AudioContext || window.webkitAudioContext;\n      this._audioCtx = new Ctx();\n    }\n    if (this._audioCtx.state === \"suspended\") this._audioCtx.resume();\n    return this._audioCtx;\n  }\n\n  tone(freqStart, freqEnd, duration, type, gainVal) {\n    const ctx = this.ensureAudio();\n    const osc = ctx.createOscillator();\n    const gain = ctx.createGain();\n    osc.type = type || \"sine\";\n    osc.frequency.setValueAtTime(freqStart, ctx.currentTime);\n    osc.frequency.linearRampToValueAtTime(freqEnd, ctx.currentTime + duration);\n    gain.gain.setValueAtTime(gainVal || 0.2, ctx.currentTime);\n    gain.gain.linearRampToValueAtTime(0.0001, ctx.currentTime + duration);\n    osc.connect(gain);\n    gain.connect(ctx.destination);\n    osc.start();\n    osc.stop(ctx.currentTime + duration);\n    return osc;\n  }\n\n  noiseBurst(duration, gainVal) {\n    const ctx = this.ensureAudio();\n    const bufferSize = Math.floor(ctx.sampleRate * duration);\n    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);\n    const data = buffer.getChannelData(0);\n    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);\n    const src = ctx.createBufferSource();\n    src.buffer = buffer;\n    const gain = ctx.createGain();\n    gain.gain.setValueAtTime(gainVal || 0.3, ctx.currentTime);\n    src.connect(gain);\n    gain.connect(ctx.destination);\n    src.start();\n  }\n\n  playShoot() { this.noiseBurst(0.12, 0.35); this.tone(500, 120, 0.12, \"square\", 0.15); }\n  playWhistle() { this._whistleOsc = this.tone(300, 1100, 0.65, \"sine\", 0.06); }\n  playThunk() { this.noiseBurst(0.08, 0.25); this.tone(140, 60, 0.18, \"triangle\", 0.3); }\n  playSuccess() {\n    const ctx = this.ensureAudio();\n    [523, 659, 784].forEach((f, i) => setTimeout(() => this.tone(f, f, 0.18, \"triangle\", 0.18), i * 90));\n  }\n  playBuzz() { this.tone(160, 90, 0.35, \"sawtooth\", 0.22); }\n\n  updateAimFromClient(clientX, clientY) {\n    if (this.state.phase !== \"choosing\" || !this.boardRef.current) return;\n    const rect = this.boardRef.current.getBoundingClientRect();\n    const cx = rect.left + rect.width / 2;\n    const cy = rect.top + rect.height / 2;\n    const s = this.state2Scale || 1;\n    let dx = (clientX - cx) / s;\n    let dy = (clientY - cy) / s;\n    const r = Math.sqrt(dx * dx + dy * dy);\n    const maxR = 368;\n    if (r > maxR) { dx = (dx / r) * maxR; dy = (dy / r) * maxR; }\n    let tier = null;\n    if (r <= 123) tier = \"ORO\";\n    else if (r <= 252) tier = \"PLATA\";\n    else if (r <= 378) tier = \"BRONCE\";\n    this.setState({ aimX: dx, aimY: dy, aimTier: tier });\n  }\n\n  handleAimMove = (e) => this.updateAimFromClient(e.clientX, e.clientY);\n  handleAimTouch = (e) => {\n    if (e.touches && e.touches[0]) this.updateAimFromClient(e.touches[0].clientX, e.touches[0].clientY);\n  };\n\n  resolveAim(clientX, clientY) {\n    if (!this.boardRef.current) return null;\n    const rect = this.boardRef.current.getBoundingClientRect();\n    const cx = rect.left + rect.width / 2;\n    const cy = rect.top + rect.height / 2;\n    const s = this.state2Scale || 1;\n    let dx = (clientX - cx) / s;\n    let dy = (clientY - cy) / s;\n    const r = Math.sqrt(dx * dx + dy * dy);\n    let tier = null;\n    if (r <= 123) tier = \"ORO\";\n    else if (r <= 252) tier = \"PLATA\";\n    else if (r <= 378) tier = \"BRONCE\";\n    if (!tier) return null;\n    return { dx, dy, tier };\n  }\n\n  fireHandler = (e) => {\n    const aim = this.resolveAim(e.clientX, e.clientY);\n    if (!aim) return;\n    this.setState({ aimX: aim.dx, aimY: aim.dy, aimTier: aim.tier });\n    this.fire(aim.tier, aim.dx, aim.dy);\n  };\n\n  fire = (tierArg, dxArg, dyArg) => {\n    if (this.state.phase !== \"choosing\") return;\n    const tier = tierArg != null ? tierArg : this.state.aimTier;\n    if (!tier) return;\n    const dx = dxArg != null ? dxArg : this.state.aimX;\n    const dy = dyArg != null ? dyArg : this.state.aimY;\n    const rot = Math.round(Math.random() * 36 - 18);\n    this.playShoot();\n    this.playWhistle();\n    this.setState({ phase: \"throwing\", lastTier: tier, dartDx: dx, dartDy: dy, dartRot: rot });\n    setTimeout(() => {\n      this.playThunk();\n      this.setState({ phase: \"landed\" });\n    }, 700);\n    setTimeout(() => {\n      const player = this.state.idx % 2;\n      const current = this.state.pool[this.state.idx];\n      const correct = tier === current.tier;\n      this.setState(s => {\n        const scores = s.scores.slice();\n        const streaks = s.streaks.slice();\n        if (correct) { scores[player] += 1; streaks[player] += 1; } else { streaks[player] = 0; }\n        return { phase: \"result\", scores, streaks };\n      });\n      if (correct) {\n        this.playSuccess();\n        const confetti = Array.from({ length: 36 }, (_, i) => ({\n          id: Date.now() + i,\n          left: (Math.random() * 96) + \"%\",\n          bg: CONFETTI_COLORS[i % CONFETTI_COLORS.length],\n          dur: (0.9 + Math.random() * 0.6) + \"s\",\n          delay: (Math.random() * 0.25) + \"s\"\n        }));\n        this.setState({ confetti, flash: true });\n        setTimeout(() => this.setState({ flash: false }), 420);\n        setTimeout(() => this.setState({ confetti: [] }), 2200);\n      } else {\n        this.playBuzz();\n        this.setState({ shake: true });\n        setTimeout(() => this.setState({ shake: false }), 460);\n      }\n    }, 950);\n  };\n\n  nextRound = () => {\n    const isLast = this.state.idx >= this.state.pool.length - 1;\n    if (isLast) {\n      this.setState({ phase: \"summary\" });\n    } else {\n      this.setState(s => ({\n        idx: s.idx + 1, phase: \"choosing\", dartDx: 0, dartDy: 0, aimX: 0, aimY: 0, aimTier: \"ORO\"\n      }));\n    }\n  };\n\n  renderVals() {\n    const pool = this.state.pool.length ? this.state.pool : [{ name: \"Cargando...\", type: \"producto\", tier: \"ORO\" }];\n    const item = pool[Math.min(this.state.idx, pool.length - 1)];\n    const total = pool.length;\n    const activePlayer = this.state.idx % 2;\n    const lights = Array.from({ length: 24 }, (_, i) => ({\n      id: i, left: (i * (100 / 24)) + \"%\", delay: ((i % 4) * 0.3) + \"s\"\n    }));\n\n    const throwing = this.state.phase === \"throwing\";\n    const settled = (this.state.phase === \"landed\" || this.state.phase === \"result\" || this.state.phase === \"summary\");\n    const correct = this.state.phase !== \"choosing\" && this.state.phase !== \"throwing\" && this.state.lastTier === item.tier;\n\n    return {\n      stageScale: \"scale(\" + this.state2Scale + \")\",\n      remoteStatusLabel: \"Control remoto: \" + (this.remoteStatus || \"conectando...\"),\n      remoteStatusColor: this.remoteStatus === \"conectado\" ? \"#5DD3B3\" : \"#FF8A3D\",\n      lights,\n      item: {\n        name: item.name,\n        tier: item.tier,\n        tierDesc: TIER_DESC[item.tier],\n        badgeLabel: item.type === \"producto\" ? \"PRODUCTO TERMINADO\" : \"MATERIA PRIMA\",\n        badgeColor: item.type === \"producto\" ? \"#F2C238\" : \"#C7CBCE\"\n      },\n      roundLabel: (Math.min(this.state.idx + 1, total)) + \" / \" + total,\n      score1: this.state.scores[0],\n      score2: this.state.scores[1],\n      streak1: this.state.streaks[0],\n      streak2: this.state.streaks[1],\n      showCombo1: this.state.streaks[0] >= 2,\n      showCombo2: this.state.streaks[1] >= 2,\n      turnLabel: \"JUGADOR \" + (activePlayer + 1),\n      turnColor: activePlayer === 0 ? \"#F2C238\" : \"#5DD3B3\",\n      p1BorderColor: activePlayer === 0 ? \"#F2C238\" : \"rgba(255,255,255,0.25)\",\n      p2BorderColor: activePlayer === 1 ? \"#5DD3B3\" : \"rgba(255,255,255,0.25)\",\n\n      boardRef: this.boardRef,\n      handleAimMove: this.handleAimMove,\n      handleAimTouch: this.handleAimTouch,\n      fireHandler: this.fireHandler,\n      boardCursor: this.state.phase === \"choosing\" ? \"none\" : \"default\",\n\n      aimXpx: \"calc(-50% + \" + this.state.aimX + \"px)\",\n      aimYpx: \"calc(-50% + \" + this.state.aimY + \"px)\",\n      reticleOpacity: this.state.phase === \"choosing\" ? 1 : 0,\n\n      dartDxPx: this.state.dartDx + \"px\",\n      dartDyPx: this.state.dartDy + \"px\",\n      dartRotDeg: this.state.dartRot + \"deg\",\n      dartTipOpacity: settled ? 0 : 1,\n      dartHoleOpacity: settled ? 1 : 0,\n      dartOpacity: this.state.phase === \"choosing\" ? 0 : 1,\n      dartTransform: settled\n        ? \"translate(calc(-50% + \" + this.state.dartDx + \"px), calc(-50% + \" + this.state.dartDy + \"px)) rotate(\" + this.state.dartRot + \"deg) scale(0.92)\"\n        : \"translate(-50%, 460px) rotate(200deg) scale(1.3)\",\n      dartAnimation: throwing ? \"dartFly 0.7s cubic-bezier(.25,.55,.25,1) forwards\" : \"none\",\n\n      confetti: this.state.confetti,\n      flash: this.state.flash,\n      rootShakeAnim: this.state.shake ? \"shakeX 0.45s ease\" : \"none\",\n\n      showResult: this.state.phase === \"result\",\n      showSummary: this.state.phase === \"summary\",\n      resultBorderColor: correct ? \"#2E7D46\" : \"#B23B2E\",\n      resultHeadline: correct ? \"¡ACERTASTE!\" : \"¡CASI!\",\n      nextButtonLabel: this.state.idx >= total - 1 ? \"VER RESULTADOS\" : \"SIGUIENTE DARDO\",\n      nextRound: this.nextRound,\n\n      summaryHeadline: this.state.scores[0] === this.state.scores[1] ? \"¡Empate!\" :\n        (this.state.scores[0] > this.state.scores[1] ? \"¡Gana Jugador 1!\" : \"¡Gana Jugador 2!\"),\n      restartGame: this.restartGame\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
